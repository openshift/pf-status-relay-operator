version: "2"
run:
  timeout: 5m
  allow-parallel-runners: true
linters:
  disable-all: true
  enable:
    - dupl
    - errcheck
    - copyloopvar
    - goconst
    - gocyclo
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - typecheck
    - unconvert
    - unparam
    - unused
  exclusions:
    # don't skip warning about doc comments
    # don't exclude the default set of lint
    preset: none
    rules:
      - path: "api/*"
        linters:
          - lll
      - path: "internal/*"
        linters:
          - dupl
          - lll
formatters:
  enable:
    - gofmt
    - goimports
